[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git node_modules __pycache__ .pytest_cache tmp_checkpoints
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    torch: marks tests requiring PyTorch
    db: marks tests requiring database
    api: marks tests for API routes
    model: marks tests for ML models
