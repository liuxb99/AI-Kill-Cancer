name: Fix Vercel Project Settings
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Get Team ID
        run: |
          echo "VERCEL_ORG_ID=$(vercel teams list --token=${{ secrets.VERCEL_TOKEN }} --json | python3 -c 'import sys,json; data=json.load(sys.stdin); [print(t["id"]) for t in data if t["slug"]=="liuxb99-9860s-projects"]')" >> $GITHUB_ENV

      - name: Print Team ID
        run: echo "Team ID=${{ env.VERCEL_ORG_ID }}"

      - name: Update Project Settings via API
        run: |
          curl -s -X PATCH "https://api.vercel.com/v9/projects/ai-kill-cancer-zqpi" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "rootDirectory": "src/frontend",
              "framework": "vite",
              "buildCommand": "npm run build",
              "outputDirectory": "dist",
              "installCommand": "npm ci",
              "nodeVersion": "22.x"
            }' | python3 -m json.tool

      - name: Verify Updated Settings
        run: vercel project inspect ai-kill-cancer-zqpi --token=${{ secrets.VERCEL_TOKEN }}
