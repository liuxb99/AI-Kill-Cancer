name: Remove Frontend Project
on:
  workflow_dispatch:

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: Record frontend project info
        run: |
          echo "=== frontend project info (pre-deletion) ==="
          curl -s "https://api.vercel.com/v9/projects/frontend" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; p=json.load(sys.stdin); print(f'Name: {p[\"name\"]}'); print(f'ID: {p[\"id\"]}'); print(f'Updated: {p.get(\"updatedAt\",\"?\")}')"

      - name: Delete frontend project
        run: |
          echo "Deleting frontend project..."
          curl -s -X DELETE "https://api.vercel.com/v9/projects/frontend" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin))"

      - name: Verify deletion
        run: |
          echo "=== Verifying frontend project deleted ==="
          curl -s "https://api.vercel.com/v9/projects/frontend" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Status: {d.get(\"error\",{}).get(\"code\",\"?\")} — {d.get(\"error\",{}).get(\"message\",\"?\")}')"
