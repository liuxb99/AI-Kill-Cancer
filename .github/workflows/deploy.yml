name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  APP_NAME: ai-kill-cancer
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "Pulling latest image..."
            docker pull ${{ env.IMAGE }}:latest

            echo "Stopping old container..."
            docker stop ${{ env.APP_NAME }} || true
            docker rm ${{ env.APP_NAME }} || true

            echo "Starting new container..."
            docker run -d \
              --name ${{ env.APP_NAME }} \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e REDIS_URL="${{ secrets.REDIS_URL }}" \
              -e LOG_LEVEL=info \
              -v /data/${{ env.APP_NAME }}/logs:/app/logs \
              -v /data/${{ env.APP_NAME }}/models:/app/models \
              ${{ env.IMAGE }}:latest

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Container status:"
            docker ps --filter name=${{ env.APP_NAME }}
EOF

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for startup
        run: sleep 30
      - name: Check health endpoint
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.DEPLOY_HOST }}:8000/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 120s"
          exit 1

  rollback:
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    steps:
      - name: Rollback to previous version
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            echo "Rolling back..."
            docker stop ${{ env.APP_NAME }} || true
            docker rm ${{ env.APP_NAME }} || true
            TAG=$(docker images --format "{{.Tag}}" ${{ env.IMAGE }} | sort -u | tail -2 | head -1)
            if [ -n "$TAG" ]; then
              docker run -d \
                --name ${{ env.APP_NAME }} \
                --restart unless-stopped \
                -p 8000:8000 \
                ${{ env.IMAGE }}:$TAG
              echo "Rolled back to $TAG"
            else
              echo "No fallback image available"
              exit 1
            fi
EOF
