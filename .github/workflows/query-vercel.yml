name: Query Vercel Projects
on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: List all projects
        run: vercel project ls --token=${{ secrets.VERCEL_TOKEN }}

      - name: Inspect ai-kill-cancer-zqpi
        run: vercel project inspect ai-kill-cancer-zqpi --token=${{ secrets.VERCEL_TOKEN }}
