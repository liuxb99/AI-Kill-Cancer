name: CI

on:
  push:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cancer_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements-api.txt
          pip install pytest pytest-cov ruff mypy numpy

      - name: Lint with ruff
        run: ruff check src/ tests/

      # TODO: Re-enable mypy when type annotations are complete across the codebase.
      # Current approach: mypy src/ --ignore-missing-imports
      # Blocked on: missing type annotations in models/, repositories/, and domain/

      - name: Test with pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cancer_db
        run: pytest -v --tb=short --cov=src/backend

      - name: Test migration
        env:
          DATABASE_URL: sqlite+aiosqlite:///test_ci.db
        run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Build frontend
        run: npm run build
        working-directory: src/frontend

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose -f docker/docker-compose.yml build

      - name: Start services
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for services healthy
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 60 sh -c 'until docker compose -f docker/docker-compose.yml exec -T db pg_isready -U postgres 2>/dev/null; do sleep 2; done'
          echo "PostgreSQL is healthy"
          echo "Waiting for Redis..."
          timeout 30 sh -c 'until docker compose -f docker/docker-compose.yml exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; do sleep 2; done'
          echo "Redis is healthy"
          echo "Waiting for API..."
          timeout 60 sh -c 'until curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health 2>/dev/null | grep -q 200; do sleep 2; done'
          echo "API is healthy"
          echo "API container status:"
          docker compose -f docker/docker-compose.yml ps
          echo "Waiting for Frontend..."
          timeout 60 sh -c 'until docker compose -f docker/docker-compose.yml ps --format json 2>/dev/null | grep cancer_frontend | grep -q running; do sleep 2; done'
          echo "Frontend container is running"

      - name: Run Alembic migration
        run: |
          docker compose -f docker/docker-compose.yml exec -T api alembic upgrade head
          echo "Migration completed"

      - name: Smoke test — register + login + create patient + create case + ACL
        run: |
          # Register user
          REG_RESP=$(curl -s -X POST http://localhost:8000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"smoke_user","password":"SmokePass123!","display_name":"Smoke Tester"}')
          echo "Register: $(echo $REG_RESP | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("id","FAIL"))')"
          echo "$REG_RESP" | python3 -c 'import sys,json; d=json.load(sys.stdin); assert "id" in d, "Register failed"'

          # Login
          LOGIN_RESP=$(curl -s -X POST http://localhost:8000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"smoke_user","password":"SmokePass123!"}')
          TOKEN=$(echo "$LOGIN_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["access_token"])')
          echo "Token acquired: ${TOKEN:0:20}..."

          # Create patient
          PAT_RESP=$(curl -s -X POST http://localhost:8000/api/v1/patients \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"sex":"F","consent_status":"granted"}')
          PAT_ID=$(echo "$PAT_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          echo "Patient created: $PAT_ID"

          # Create case
          CASE_RESP=$(curl -s -X POST http://localhost:8000/api/v1/cases \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d "{\"patient_id\":\"$PAT_ID\",\"cancer_type\":\"PTC\"}")
          CASE_ID=$(echo "$CASE_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          echo "Case created: $CASE_ID"

          # Unrelated user — should get 403
          curl -s -X POST http://localhost:8000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"intruder","password":"Intrude123!","display_name":"Intruder"}' > /dev/null
          INT_LOGIN=$(curl -s -X POST http://localhost:8000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"intruder","password":"Intrude123!"}')
          INT_TOKEN=$(echo "$INT_LOGIN" | python3 -c 'import sys,json; print(json.load(sys.stdin)["access_token"])')
          INT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/v1/cases/$CASE_ID \
            -H "Authorization: Bearer $INT_TOKEN")
          echo "Unrelated user case access: $INT_STATUS (expected 403)"
          [ "$INT_STATUS" = "403" ] || { echo "FAIL: Unrelated user should get 403, got $INT_STATUS"; exit 1; }

          # Owner access — should get 200
          OWN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/v1/cases/$CASE_ID \
            -H "Authorization: Bearer $TOKEN")
          echo "Owner case access: $OWN_STATUS (expected 200)"
          [ "$OWN_STATUS" = "200" ] || { echo "FAIL: Owner should get 200, got $OWN_STATUS"; exit 1; }

          echo "=== ALL SMOKE TESTS PASSED ==="

      - name: Collect logs
        if: always()
        run: docker compose -f docker/docker-compose.yml logs --no-color

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
