name: CI
on:
  push:
    branches: [master]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy
      - name: Lint with ruff
        run: ruff check src/ tests/ || true
      - name: Test with pytest
        run: pytest -v --tb=short --ignore=tests/test_models.py
      - name: Test migration
        run: |
          DATABASE_URL=sqlite+aiosqlite:///test_ci.db alembic upgrade head
