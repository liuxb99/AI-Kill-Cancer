name: CI

on:
  push:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cancer_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements-api.txt
          pip install pytest pytest-cov ruff mypy numpy httpx pytest-asyncio anyio

      - name: Lint with ruff
        run: ruff check src/ tests/

      # TODO: Re-enable mypy when type annotations are complete across the codebase.
      # Current approach: mypy src/ --ignore-missing-imports
      # Blocked on: missing type annotations in models/, repositories/, and domain/

      - name: Test with pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cancer_db
        run: pytest -v --tb=short --cov=src/backend

      - name: Test migration
        env:
          DATABASE_URL: sqlite+aiosqlite:///test_migration_ci.db
          PYTHONPATH: .
        run: |
          rm -f test_migration_ci.db test_migration_ci.db-wal test_migration_ci.db-shm
          alembic -c migrations/alembic.ini upgrade head

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Build frontend
        run: npm run build
        working-directory: src/frontend

