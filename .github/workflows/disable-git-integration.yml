name: Disable Vercel Git Integration
on:
  workflow_dispatch:

jobs:
  disable:
    runs-on: ubuntu-latest
    steps:
      - name: Disable Git Integration via API
        run: |
          curl -s -X PATCH "https://api.vercel.com/v9/projects/ai-kill-cancer-zqpi" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "gitProviderOptions": {
                "createDeployments": "disabled"
              }
            }' | python3 -m json.tool

      - name: Verify Integration Disabled
        run: |
          curl -s "https://api.vercel.com/v9/projects/ai-kill-cancer-zqpi" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('createDeployments:', d.get('gitProviderOptions',{}).get('createDeployments','?'))"
