global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: "ai-kill-cancer-api"
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics
    scheme: http
    scrape_interval: 10s
    scrape_timeout: 8s
    health_check_path: /health
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "ai-kill-cancer-api"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "python_|process_|gc_"
        action: keep

  - job_name: "ai-kill-cancer-model"
    static_configs:
      - targets: ["model-server:8080"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 25s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "(model_|inference_|prediction_).*"
        action: keep

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 15s
